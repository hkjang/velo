name: oss-compliance

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:
  workflow_dispatch:

jobs:
  compliance:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Validate OSS reuse policy
        shell: pwsh
        run: ./scripts/check-oss-compliance.ps1

      - name: Upload compliance report
        uses: actions/upload-artifact@v4
        with:
          name: oss-compliance-report
          path: third_party/reports/oss-compliance-report.md
          if-no-files-found: error
