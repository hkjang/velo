apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "velo-was.fullname" . }}-config
  labels:
    {{- include "velo-was.labels" . | nindent 4 }}
data:
  server.yaml: |
    server:
      name: velo-was
      nodeId: ${HOSTNAME}
      gracefulShutdownMillis: 30000
      listener:
        host: 0.0.0.0
        port: 8080
      aiPlatform:
        enabled: {{ .Values.aiPlatform.enabled }}
        mode: {{ .Values.aiPlatform.mode }}
        console:
          enabled: true
          contextPath: {{ .Values.aiPlatform.contextPath }}
        advanced:
          intentRoutingEnabled: {{ .Values.aiPlatform.intentRouting.enabled }}
          intentAnalysisWindow: {{ .Values.aiPlatform.intentRouting.analysisWindow }}
          contextCacheEnabled: true
          aiGatewayEnabled: true
          observabilityEnabled: true
        platform:
          modelRegistrationEnabled: true
          versionManagementEnabled: true
          billingEnabled: true
          multiTenantEnabled: true
          developerPortalEnabled: true
