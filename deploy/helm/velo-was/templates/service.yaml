apiVersion: v1
kind: Service
metadata:
  name: {{ include "velo-was.fullname" . }}
  labels:
    {{- include "velo-was.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
  selector:
    {{- include "velo-was.selectorLabels" . | nindent 4 }}
