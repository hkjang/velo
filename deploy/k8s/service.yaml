apiVersion: v1
kind: Service
metadata:
  name: velo-was
  namespace: velo
  labels:
    app.kubernetes.io/name: velo-was
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: velo-was
---
# NodePort for external access (dev/test)
apiVersion: v1
kind: Service
metadata:
  name: velo-was-nodeport
  namespace: velo
  labels:
    app.kubernetes.io/name: velo-was
spec:
  type: NodePort
  ports:
    - name: http
      port: 8080
      targetPort: http
      nodePort: 30080
  selector:
    app.kubernetes.io/name: velo-was
