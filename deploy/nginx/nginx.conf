events {
    worker_connections 1024;
}

http {
    upstream velo_cluster {
        least_conn;
        server velo-was:8080;
        server velo-was-2:8080;
    }

    server {
        listen 80;
        server_name _;

        # Health check
        location /health {
            proxy_pass http://velo_cluster/ai-platform/api/status;
            proxy_set_header Host $host;
        }

        # AI Platform
        location / {
            proxy_pass http://velo_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE streaming support
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            chunked_transfer_encoding on;
        }
    }
}
