# ──────────────────────────────────────────────────────────
#  Velo WAS — Docker Compose
#
#  기본 실행:
#    docker compose up -d
#
#  Redis 포함 (의도 라우팅 캐시):
#    docker compose --profile redis up -d
#
#  모니터링 포함 (Prometheus + Grafana):
#    docker compose --profile monitoring up -d
#
#  전체 스택:
#    docker compose --profile redis --profile monitoring up -d
# ──────────────────────────────────────────────────────────
version: "3.9"

services:
  # ── Velo WAS (Primary) ──────────────────────────────────
  velo-was:
    build: .
    image: velo-was:latest
    container_name: velo-was
    restart: unless-stopped
    ports:
      - "${VELO_PORT:-8080}:8080"
    volumes:
      - ./conf:/opt/velo/conf:ro
      - velo-data:/opt/velo/data
      - velo-logs:/opt/velo/logs
      - ./webapps:/opt/velo/webapps:ro
    environment:
      - JAVA_OPTS=-Xms256m -Xmx1g -XX:+UseZGC -XX:+ZGenerational
      - VELO_JVM_OPTS=${VELO_JVM_OPTS:-}
      - VELO_CONFIG=/opt/velo/conf/server.yaml
      # AI Provider API Keys (set in .env file)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Redis (optional)
      - VELO_REDIS_URL=${VELO_REDIS_URL:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/ai-platform/api/status"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - velo-net
    deploy:
      resources:
        limits:
          memory: 1536M
        reservations:
          memory: 512M

  # ── Velo WAS Node 2 (Scale) ────────────────────────────
  velo-was-2:
    build: .
    image: velo-was:latest
    container_name: velo-was-2
    restart: unless-stopped
    profiles: ["cluster"]
    ports:
      - "8081:8080"
    volumes:
      - ./conf:/opt/velo/conf:ro
      - velo-data:/opt/velo/data
      - velo-logs:/opt/velo/logs
    environment:
      - JAVA_OPTS=-Xms256m -Xmx1g -XX:+UseZGC -XX:+ZGenerational
      - VELO_REDIS_URL=${VELO_REDIS_URL:-redis://redis:6379}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - velo-net

  # ── Redis (Intent Routing Cache) ───────────────────────
  redis:
    image: redis:7-alpine
    container_name: velo-redis
    restart: unless-stopped
    profiles: ["redis", "cluster"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - velo-net

  # ── Nginx Reverse Proxy (Load Balancer) ────────────────
  nginx:
    image: nginx:alpine
    container_name: velo-nginx
    restart: unless-stopped
    profiles: ["cluster"]
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - velo-was
      - velo-was-2
    networks:
      - velo-net

  # ── Prometheus ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: velo-prometheus
    restart: unless-stopped
    profiles: ["monitoring"]
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - velo-net

  # ── Grafana ────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: velo-grafana
    restart: unless-stopped
    profiles: ["monitoring"]
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - velo-net

volumes:
  velo-data:
  velo-logs:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  velo-net:
    driver: bridge
