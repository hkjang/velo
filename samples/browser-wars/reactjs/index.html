<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReactJS WAR Sample</title>
  <link rel="stylesheet" href="./showcase.css">
</head>
<body>
<main class="page-shell">
  <section class="hero">
    <div class="eyebrow">velo-was browser showcase</div>
    <h1>ReactJS WAR Sample</h1>
    <p>React 상태 업데이트와 JSON fetch 기반 렌더링이 WAR 정적 자산 배포 경로에서 정상 동작하는지 확인한다.</p>
    <div class="hero-meta">
      <span class="pill" data-sample-status>BOOTING</span>
      <span class="pill muted" data-sample-note>React runtime 준비 중</span>
    </div>
  </section>
  <section id="app" class="dashboard"></section>
</main>
<script>
  (function () {
    function setFailure(message) {
      var status = document.querySelector("[data-sample-status]");
      var note = document.querySelector("[data-sample-note]");
      if (status) status.textContent = "ERROR";
      if (note) note.textContent = message;
    }
    window.addEventListener("error", function (event) {
      setFailure(event.message || "script error");
    });
    window.addEventListener("unhandledrejection", function (event) {
      setFailure(event.reason && event.reason.message ? event.reason.message : "promise rejected");
    });
  })();
</script>
<script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/htm@3.1.1/dist/htm.umd.js"></script>
<script src="./app.js"></script>
</body>
</html>
